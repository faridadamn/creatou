<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Creatou · Product Lifecycle</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"><link rel="stylesheet" href="assets/css/app.css"></head><body><main class="app"><header class="top"><a href="index.html">‹</a><h2>Product Lifecycle</h2><a href="product-manager-v2.html">＋</a></header><div class="body"><p class="footer">Produk ditarik langsung dari <b>Product Manager</b>. Ubah tahapnya di sini tanpa membuat duplikasi data.</p><div class="stage" id="board"></div><div class="section">Catat aktivitas lifecycle</div><div class="field"><span class="label">Produk</span><select id="product"></select><span class="label">Aktivitas</span><input id="title" placeholder="Contoh: QA halaman checkout"><div class="split"><div><span class="label">Tipe</span><select id="type"><option value="riset">Riset</option><option value="build">Development</option><option value="testing">Testing/QA</option><option value="launch">Launch</option><option value="marketing">Marketing</option></select></div><div><span class="label">Prioritas</span><select id="priority"><option>normal</option><option>high</option><option>urgent</option></select></div></div><span class="label">Catatan</span><textarea id="note"></textarea></div><button class="btn" onclick="addActivity()">Simpan Aktivitas Lifecycle</button><div class="section">Aktivitas lifecycle</div><div class="card" id="activities"></div></div></main><div class="toast" id="toast"></div><script src="assets/js/db.js"></script><script>const stages=['Ide & Riset','Planning','Development','Testing','Launch Prep','Live','Growth','Maintenance'];const toastEl=document.getElementById('toast');function toast(t){toastEl.textContent=t;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),1600)}function render(){let d=CreatouDB.ensure();product.innerHTML=d.products.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');board.innerHTML=stages.map(s=>{let ps=d.products.filter(p=>p.lifecycleStage===s);return `<div class="card"><b>${s}</b><small class="label">${ps.length} produk</small>${ps.map(p=>`<div class="row"><div class="meta"><b>${p.name}</b><small>${CreatouDB.money(p.price)}</small></div><select onchange="setStage('${p.id}',this.value)">${stages.map(x=>`<option ${x===p.lifecycleStage?'selected':''}>${x}</option>`).join('')}</select></div>`).join('')||'<p class="empty">Belum ada</p>'}</div>`}).join('');let a=d.activities.filter(x=>x.module==='lifecycle');activities.innerHTML=a.map(x=>`<div class="row"><div class="icon"><i class="ti ti-rocket"></i></div><div class="meta"><b>${x.title}</b><small>${CreatouDB.product(x.relatedProductId)?.name||'-'} · ${x.type}</small></div><span class="tag ${x.priority==='urgent'?'urgent':''}">${x.priority}</span></div>`).join('')||'<div class="empty">Belum ada aktivitas lifecycle.</div>'}function setStage(id,value){CreatouDB.update(d=>d.products.find(p=>p.id===id).lifecycleStage=value);toast('Tahap produk diperbarui.');render()}function addActivity(){if(!product.value||!title.value.trim())return toast('Pilih produk dan isi aktivitas.');CreatouDB.update(d=>d.activities.unshift({id:CreatouDB.uid('act'),module:'lifecycle',relatedProductId:product.value,title:title.value.trim(),type:type.value,date:CreatouDB.today(),time:'',nextDate:CreatouDB.today(),status:'plan',priority:priority.value,note:note.value.trim()}));title.value='';note.value='';toast('Aktivitas lifecycle disimpan.');render()}render();window.addEventListener('creatou:changed',render)</script></body></html>
