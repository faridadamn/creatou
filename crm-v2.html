<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Creatou · CRM</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"><link rel="stylesheet" href="assets/css/app.css"></head><body><main class="app"><header class="top"><a href="index.html">‹</a><h2>CRM Activity</h2><button onclick="document.getElementById('dealForm').scrollIntoView()">＋</button></header><div class="body"><div class="section">Pipeline Deal <a href="product-manager-v2.html">Produk</a></div><div class="stage" id="pipeline"></div><div class="section">Tambah customer & deal</div><div class="field" id="dealForm"><span class="label">Nama customer</span><input id="customerName" placeholder="PT / toko / customer"><div class="split"><div><span class="label">PIC</span><input id="pic" placeholder="Nama PIC"></div><div><span class="label">Nilai deal</span><input id="value" type="number" value="0"></div></div><span class="label">Produk ditawarkan</span><select id="product"></select><span class="label">Tahap</span><select id="stage"><option>Prospek Baru</option><option>Qualified</option><option>Meeting</option><option>Proposal</option><option>Negosiasi</option><option>Deal</option><option>Lost</option></select></div><button class="btn" onclick="addDeal()">Simpan Customer & Deal</button><div class="section">Tambah follow-up</div><div class="field"><span class="label">Deal</span><select id="deal"></select><span class="label">Tujuan follow-up</span><input id="activityTitle" placeholder="Contoh: Konfirmasi proposal revisi"><div class="split"><div><span class="label">Tanggal</span><input id="date" type="date"></div><div><span class="label">Prioritas</span><select id="priority"><option>normal</option><option>high</option><option>urgent</option></select></div></div></div><button class="btn secondary" onclick="addActivity()">Tambah Follow-up</button><div class="section">Aktivitas CRM</div><div class="card" id="activities"></div></div></main><div class="toast" id="toast"></div><script src="assets/js/db.js"></script><script>const crmStages=['Prospek Baru','Qualified','Meeting','Proposal','Negosiasi','Deal','Lost'];const toastEl=document.getElementById('toast');date.value=CreatouDB.today();function toast(t){toastEl.textContent=t;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),1600)}function render(){let d=CreatouDB.ensure();product.innerHTML=d.products.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');deal.innerHTML=d.deals.map(x=>{let c=CreatouDB.customer(x.customerId),p=CreatouDB.product(x.productId);return `<option value="${x.id}">${c?.name||'-'} · ${p?.name||'-'}</option>`}).join('');pipeline.innerHTML=crmStages.map(s=>{let ds=d.deals.filter(x=>x.stage===s);return `<div class="card"><b>${s}</b><small class="label">${ds.length} deal</small>${ds.map(x=>{let c=CreatouDB.customer(x.customerId),p=CreatouDB.product(x.productId);return `<div class="row"><div class="meta"><b>${c?.name||'-'}</b><small>${p?.name||'-'} · ${CreatouDB.money(x.value)}</small></div><select onchange="setStage('${x.id}',this.value)">${crmStages.map(y=>`<option ${y===x.stage?'selected':''}>${y}</option>`).join('')}</select></div>`}).join('')||'<p class="empty">Belum ada</p>'}</div>`}).join('');let a=d.activities.filter(x=>x.module==='crm');activities.innerHTML=a.map(x=>{let c=CreatouDB.customer(x.relatedCustomerId),p=CreatouDB.product(x.relatedProductId);return `<div class="row"><div class="icon"><i class="ti ti-phone-call"></i></div><div class="meta"><b>${x.title}</b><small>${c?.name||'-'} · ${p?.name||'-'} · ${x.date}</small></div><button class="tag ${x.status==='done'?'done':''}" onclick="complete('${x.id}')">${x.status==='done'?'Selesai':'Tandai selesai'}</button></div>`}).join('')||'<div class="empty">Belum ada follow-up.</div>'}function addDeal(){if(!customerName.value.trim()||!product.value)return toast('Customer dan produk wajib diisi.');CreatouDB.update(d=>{let c={id:CreatouDB.uid('cus'),name:customerName.value.trim(),pic:pic.value.trim()||'PIC belum diisi',phone:'',notes:''};d.customers.unshift(c);d.deals.unshift({id:CreatouDB.uid('deal'),customerId:c.id,productId:product.value,value:Number(value.value||0),stage:stage.value,status:stage.value==='Deal'?'won':'open'})});customerName.value='';pic.value='';value.value='0';toast('Customer dan deal terhubung ke produk.');render()}function addActivity(){let x=CreatouDB.load().deals.find(x=>x.id===deal.value);if(!x||!activityTitle.value.trim())return toast('Pilih deal dan isi aktivitas.');CreatouDB.update(d=>d.activities.unshift({id:CreatouDB.uid('act'),module:'crm',relatedCustomerId:x.customerId,relatedProductId:x.productId,title:activityTitle.value.trim(),type:'followup',date:date.value,time:'',nextDate:date.value,status:'plan',priority:priority.value,note:''}));activityTitle.value='';toast('Follow-up tersimpan.');render()}function setStage(id,s){CreatouDB.update(d=>{let x=d.deals.find(x=>x.id===id);x.stage=s;x.status=s==='Deal'?'won':s==='Lost'?'lost':'open'});toast('Pipeline diperbarui.');render()}function complete(id){CreatouDB.update(d=>d.activities.find(x=>x.id===id).status='done');render()}render();window.addEventListener('creatou:changed',render)</script></body></html>
