<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Creatou · Product Manager</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"><link rel="stylesheet" href="assets/css/app.css"></head><body><main class="app"><header class="top"><a href="index.html">‹</a><h2>Product Manager</h2><button onclick="document.getElementById('form').scrollIntoView()">＋</button></header><div class="body"><div class="section">Master Produk <a href="product-lifecycle-v2.html">Ke Lifecycle</a></div><div id="list"></div><div class="section">Tambah produk</div><div class="field" id="form"><span class="label">Nama produk</span><input id="name" placeholder="Contoh: Template Dashboard Penjualan"><span class="label">Kategori</span><input id="category" placeholder="Digital Product / Fisik / Template"><div class="split"><div><span class="label">Harga jual</span><input id="price" type="number" value="0"></div><div><span class="label">Stok (kosongkan untuk digital)</span><input id="stock" type="number"></div></div><div class="split"><div><span class="label">Stok minimum</span><input id="minStock" type="number"></div><div><span class="label">Tahap awal</span><select id="stage"><option>Ide & Riset</option><option>Planning</option><option>Development</option><option>Testing</option><option>Launch Prep</option><option>Live</option><option>Growth</option><option>Maintenance</option></select></div></div></div><button class="btn" onclick="addProduct()">Simpan ke Master Produk</button><div class="section">Pergerakan stok terbaru</div><div class="card" id="moves"></div></div></main><div class="toast" id="toast"></div><script src="assets/js/db.js"></script><script>function toast(t){toastEl.textContent=t;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),1600)}const toastEl=document.getElementById('toast');function render(){let d=CreatouDB.ensure();list.innerHTML=d.products.map(p=>{let critical=p.stock!==null&&p.stock<=Number(p.minStock||0);return `<div class="card"><div class="row"><div class="icon"><i class="ti ${p.stock===null?'ti-file-code':'ti-package'}"></i></div><div class="meta"><b>${p.name}</b><small>${p.category||'-'} · ${CreatouDB.money(p.price)} · ${p.lifecycleStage}</small></div><span class="tag ${critical?'urgent':''}">${p.stock===null?'Digital':'Stok '+p.stock}</span></div>${p.stock!==null?`<div class="split"><button class="btn secondary" onclick="move('${p.id}',1)">+ Stok Masuk</button><button class="btn secondary" onclick="move('${p.id}',-1)">− Stok Keluar</button></div>`:''}</div>`}).join('');moves.innerHTML=d.stockMovements.slice(0,8).map(m=>{let p=CreatouDB.product(m.productId);return `<div class="row"><div class="icon"><i class="ti ti-arrows-exchange"></i></div><div class="meta"><b>${m.type==='in'?'Stok masuk':'Stok keluar'} · ${p?.name||'-'}</b><small>${m.qty} unit · ${m.source||'manual'}</small></div></div>`}).join('')||'<div class="empty">Belum ada pergerakan stok.</div>'}function addProduct(){if(!name.value.trim())return toast('Nama produk wajib diisi.');CreatouDB.update(d=>d.products.unshift({id:CreatouDB.uid('prd'),name:name.value.trim(),category:category.value.trim()||'Produk',price:Number(price.value||0),stock:stock.value===''?null:Number(stock.value),minStock:minStock.value===''?null:Number(minStock.value),lifecycleStage:stage.value,status:'active'}));['name','category','price','stock','minStock'].forEach(id=>document.getElementById(id).value='');toast('Produk masuk ke master data.');render()}function move(id,qty){CreatouDB.update(d=>{let p=d.products.find(x=>x.id===id);p.stock=Math.max(0,Number(p.stock||0)+qty);d.stockMovements.unshift({id:CreatouDB.uid('mov'),productId:id,type:qty>0?'in':'out',qty:Math.abs(qty),source:'manual',date:CreatouDB.today()})});toast('Stok diperbarui.');render()}render();window.addEventListener('creatou:changed',render)</script></body></html>
